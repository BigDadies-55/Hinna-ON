<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חוגגים חינה - ניווט וקשר</title>
    <style>
        /* עיצוב כללי ורקע חגיגי בסגנון חינה */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #800000; /* בורדו עמוק */
            background-image: url('https://www.transparenttextures.com/patterns/az-subtle.png'); 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #f1c40f; /* זהב מלכותי */
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        /* מיכל כפתורי הניווט */
        .nav-container {
            display: flex;
            gap: 20px;
            max-width: 95%;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }

        .nav-card {
            background: #fff;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 240px;
            padding: 25px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid #f1c40f;
        }

        .nav-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.4); 
        }

        .icon-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            margin-bottom: 15px;
            border: 2px solid #f1c40f;
        }

        .parking .icon-circle { background: #1a085; color: #f1c40f; }
        .home .icon-circle { background: #1a085; color: #f3c40f; }

        .card-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        
        .action-btn {
            background: #f1c40f;
            color: #800000;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* סקשן טלפונים לבירורים */
        .phone-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 25px;
            border: 1px dashed #f1c40f;
            width: 100%;
            max-width: 500px;
        }

        .phone-header {
            color: #f1c40f;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }

        .phone-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .phone-link {
            color: #fff;
            text-decoration: none;
            background: rgba(0,0,0,0.4);
            padding: 12px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #f1c40f;
            transition: all 0.3s;
            min-width: 180px;
        }

        .phone-link:hover { 
            background: #f1c40f; 
            color: #800000; 
        }

        /* התאמה לניידים */
        @media (max-width: 600px) {
            .nav-card { width: 100%; }
            .phone-grid { flex-direction: column; align-items: center; }
            .phone-link { width: 90%; justify-content: center; }
        }
    </style>
</head>
<body>

   
    <h1>קולולולו! נועה ועומר חוגגים חינה 🎉</h1>
    <p class="subtitle">כל הדרכים להגיע ולחגוג איתנו:</p>

    <div class="nav-container">
        <a href="https://ul.waze.com/ul?place=ChIJX4aHeMCuHRURICdFWKisaPE&ll=32.66259150%2C35.10484200&navigate=yes&utm_campaign=default&utm_source=waze_website&utm_medium=lm_share_location" class="nav-card parking">
            <div class="icon-circle">🅿️</div>
            <div class="card-title">לחניה</div>
            <div class="action-btn">ניווט בוויז</div>
        </a>

        <a href="https://ul.waze.com/ul?place=ChIJ2fqjE76uHRURypoZ-C-lfZ4&ll=32.66185960%2C35.10944690&navigate=yes&utm_campaign=default&utm_source=waze_website&utm_medium=lm_share_location" class="nav-card home">
            <div class="icon-circle">🏡</div>
            <div class="card-title">לבית</div>
            <div class="action-btn">ניווט בוויז</div>
        </a>
    </div>

    <div class="phone-section">
        <div class="phone-grid">
            <a href="tel:0526039454" class="phone-link">
                <span>📞</span>
                <strong>אהרוני</strong>
            </a>
            <a href="tel:0524800922" class="phone-link">
                <span>📞</span>
                <strong>אהובית</strong>
            </a>
        </div>
    </div>

</body>
</html>
