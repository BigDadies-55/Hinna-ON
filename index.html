<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניווט לחינה של נועה ועומר</title>
    <style>
        /* הגדרות בסיסיות ורקע */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        /* כותרת ראשית */
        h1 {
            color: #2c3e50;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            padding: 0 10px;
        }

        /* מיכל הכפתורים */
        .nav-container {
            display: flex;
            gap: 20px;
            max-width: 90%;
            flex-wrap: wrap; /* מותאם לנייד - שובר שורה */
            justify-content: center;
        }

        /* עיצוב כללי לכפתור */
        .nav-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            width: 280px;
            padding: 30px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid transparent;
        }

        /* אפקט מעבר עכבר/לחיצה */
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: #3498db;
        }

        /* עיצוב האייקון הגרפי */
        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin-bottom: 20px;
        }

        /* צבעים ייחודיים לכל כפתור */
        .parking .icon-circle {
            background-color: #e3f2fd;
            color: #1565c0;
        }

        .home .icon-circle {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        /* עיצוב הטקסט */
        .card-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .card-desc {
            font-size: 1rem;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        /* כפתור "ניווט" קטן */
        .action-btn {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background-color 0.3s;
        }

        .parking .action-btn { background-color: #1e88e5; }
        .home .action-btn { background-color: #43a047; }

        /* התאמה למסכים קטנים מאוד */
        @media (max-width: 600px) {
            .nav-card {
                width: 100%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <h1>לחינה של נועה ועומר! 🚗🏡</h1>

    <div class="nav-container">

        <a href="https://ul.waze.com/ul?place=ChIJX4aHeMCuHRURICdFWKisaPE&ll=32.66259150%2C35.10484200&navigate=yes&utm_campaign=default&utm_source=waze_website&utm_medium=lm_share_location" class="nav-card parking">
            <div class="icon-circle">🅿️</div>
            <div class="card-title">חניה</div>
            <div class="card-desc">ניווט ישיר לחניון הקרוב ביותר</div>
            <div class="action-btn">לחצו לניווט בוויז</div>
        </a>

        <a href="https://ul.waze.com/ul?place=ChIJ2fqjE76uHRURypoZ-C-lfZ4&ll=32.66185960%2C35.10944690&navigate=yes&utm_campaign=default&utm_source=waze_website&utm_medium=lm_share_location" class="nav-card home">
            <div class="icon-circle">🏡</div>
            <div class="card-title">בית</div>
            <div class="card-desc">ניווט ישיר לפתח הבית</div>
            <div class="action-btn">לחצו לניווט בוויז</div>
        </a>

    </div>

</body>
</html>
